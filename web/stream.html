<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>WebSRT — Stream</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #111;
        color: #ddd;
        margin: 0;
        padding: 1.5rem;
        transition: padding 0.2s ease;
      }
      body.debug-open {
      }
      body.resizing { transition: none; }
      h1 { font-size: 1.1rem; }
      h2 { font-size: 0.95rem; color: #999; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
      video, canvas { background: #000; display: block; }
      #preview {
        max-width: 100%;
        max-height: calc(100vh - 100px);
        width: auto;
        height: auto;
      }
      #preview:fullscreen {
        width: 100vw; height: 100vh; object-fit: contain; background: #000;
      }
      .ok { color: #6f6; }
      .err { color: #f66; }
      .info { color: #6cf; }
      input, button, select {
        font: inherit; padding: 4px; background: #222; color: #ddd;
        border: 1px solid #444; border-radius: 3px;
      }
      button:hover { background: #333; }
      button:disabled { opacity: 0.5; cursor: default; }
      .controls { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .controls label { display: flex; align-items: center; gap: 4px; }
      a { color: #6cf; }
      a.back { display: inline-block; margin-bottom: 8px; text-decoration: none; }
      .audio-section { margin-top: 8px; }
      .audio-row { display: flex; gap: 8px; align-items: center; margin: 4px 0; flex-wrap: wrap; }
      .audio-row label { display: flex; align-items: center; gap: 4px; min-width: 160px; }
      .audio-row select { min-width: 180px; }
      input[type="range"] { width: 80px; vertical-align: middle; }
      #pub-status { margin-top: 8px; font-size: 12px; color: #999; }
      .pub-stats { font-size: 12px; color: #999; line-height: 1.6; }

      /* Dark-themed thin scrollbars */
      * {
        scrollbar-width: thin;
        scrollbar-color: #444 transparent;
      }
      *::-webkit-scrollbar { width: 8px; height: 8px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
      *::-webkit-scrollbar-thumb:hover { background: #555; }
      *::-webkit-scrollbar-corner { background: transparent; }

      /* Debug panel overlay */
      #debug-root {
        position: fixed; top: 0; right: 0; width: 34vw; height: 100vh;
        background: rgba(17, 17, 17, 0.97); border-left: 1px solid #333;
        z-index: 9999; display: none; flex-direction: column;
        font-size: 12px; box-shadow: -4px 0 16px rgba(0,0,0,0.5);
      }
      #debug-root.visible { display: flex; }
      .debug-resizer {
        position: fixed; top: 0; right: 34vw; width: 7px; height: 100vh;
        cursor: col-resize; z-index: 10001; background: transparent;
        transition: background 0.15s; display: none;
        transform: translateX(50%);
      }
      .debug-resizer.visible { display: block; }
      .debug-resizer:hover, .debug-resizer.dragging { background: transparent; }

      .debug-tabs {
        display: flex; border-bottom: 1px solid #333; flex-shrink: 0;
        overflow-x: auto;
      }
      .debug-tab {
        padding: 6px 12px; cursor: pointer; border: none; background: none;
        color: #888; border-bottom: 2px solid transparent; white-space: nowrap;
        font: inherit; font-size: 12px;
      }
      .debug-tab.active { color: #6cf; border-bottom-color: #6cf; }
      .debug-content {
        flex: 1; overflow-y: auto; padding: 8px;
      }
      .debug-section { margin-bottom: 12px; }
      .debug-section h3 {
        font-size: 11px; color: #999; margin: 0 0 4px 0;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .debug-table { width: 100%; border-collapse: collapse; }
      .debug-table td { padding: 2px 6px; border-bottom: 1px solid #222; }
      .debug-table td:first-child { color: #999; width: 40%; }
      .debug-table td:last-child { color: #ddd; text-align: right; font-family: inherit; }
      .stat-good { color: #6f6; }
      .stat-warn { color: #fc6; }
      .stat-bad { color: #f66; }

      .chart-container { position: relative; height: 120px; margin: 4px 0; }
    </style>
  </head>
  <body>
    <div>
      <video id="preview" width="640" height="360" muted playsinline></video>
      <div class="controls">
        <button id="share-btn">Share Screen</button>
        <button id="publish-btn" disabled>Start Publishing</button>
        <button id="stop-btn" disabled>Stop</button>
      </div>
      <div class="controls">
        <label>stream: <input type="text" id="stream-name" value="default" size="10" /></label>
        <label>latency: <input type="number" id="latency-num" min="20" max="8000" step="10" value="120" />ms</label>
        <label>codec: <select id="codec-select"><option value="auto">auto</option></select></label>
        <label>bitrate: <input type="number" id="bitrate-num" min="0.5" max="50" step="0.5" value="4" />Mbps</label>
        <label>framerate: <select id="framerate-select"><option>30</option><option>60</option></select></label>
        <button id="fullscreen-btn">fullscreen</button>
      </div>

      <h2>Audio</h2>
      <div class="audio-section">
        <label>source: <select id="audio-source"><option value="">(none)</option></select></label>
      </div>

      <div id="pub-status">idle</div>
      <div class="pub-stats" id="pub-stats-text"></div>
    </div>
    <div id="debug-root"></div>
    <script src="/cert-hash.js"></script>
    <script type="module" src="/src/stream.tsx"></script>
  </body>
</html>
