<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>WebSRT — Advanced</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #111;
        color: #ddd;
        margin: 0;
        padding: 1.5rem;
        transition: padding 0.2s ease;
      }
      body.debug-open {
        padding-right: 496px;
      }
      h1 { font-size: 1.1rem; }
      video, canvas { background: #000; display: block; }
      #video-canvas { width: 100%; height: auto; }
      #video-canvas:fullscreen {
        width: 100vw; height: 100vh; object-fit: contain; background: #000;
      }
      .ok { color: #6f6; }
      .err { color: #f66; }
      .info { color: #6cf; }
      input, button, select {
        font: inherit; padding: 4px; background: #222; color: #ddd;
        border: 1px solid #444; border-radius: 3px;
      }
      button:hover { background: #333; }
      button:disabled { opacity: 0.5; }
      .controls { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      a { color: #6cf; }
      a.back { display: inline-block; margin-bottom: 8px; text-decoration: none; }

      /* Debug panel overlay */
      #debug-root {
        position: fixed; top: 0; right: 0; width: 480px; height: 100vh;
        background: rgba(17, 17, 17, 0.97); border-left: 1px solid #333;
        z-index: 9999; display: none; flex-direction: column;
        font-size: 12px; box-shadow: -4px 0 16px rgba(0,0,0,0.5);
      }
      #debug-root.visible { display: flex; }

      .debug-header {
        display: flex; align-items: center; gap: 8px; padding: 8px;
        border-bottom: 1px solid #333; flex-shrink: 0;
      }
      .debug-tabs {
        display: flex; border-bottom: 1px solid #333; flex-shrink: 0;
        overflow-x: auto;
      }
      .debug-tab {
        padding: 6px 12px; cursor: pointer; border: none; background: none;
        color: #888; border-bottom: 2px solid transparent; white-space: nowrap;
        font: inherit; font-size: 12px;
      }
      .debug-tab.active { color: #6cf; border-bottom-color: #6cf; }
      .debug-content {
        flex: 1; overflow-y: auto; padding: 8px;
      }
      .debug-section { margin-bottom: 12px; }
      .debug-section h3 {
        font-size: 11px; color: #999; margin: 0 0 4px 0;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .debug-table { width: 100%; border-collapse: collapse; }
      .debug-table td { padding: 2px 6px; border-bottom: 1px solid #222; }
      .debug-table td:first-child { color: #999; width: 40%; }
      .debug-table td:last-child { color: #ddd; text-align: right; font-family: inherit; }
      .stat-good { color: #6f6; }
      .stat-warn { color: #fc6; }
      .stat-bad { color: #f66; }

      .chart-container { position: relative; height: 120px; margin: 4px 0; }
    </style>
  </head>
  <body>
    <div>
      <canvas id="video-canvas" width="640" height="360"></canvas>
      <div class="controls">
        <button id="connect">connect</button>
        <label>latency: <input type="number" id="latency-num" min="20" max="8000" step="10" value="300" />ms</label>
        <button id="mute" disabled>muted</button>
        <button id="fullscreen">fullscreen</button>
        <button id="debug-toggle">🐛 debug</button>
      </div>
    </div>
    <div id="debug-root"></div>
    <script src="/cert-hash.js"></script>
    <script type="module" src="/src/advanced.tsx"></script>
  </body>
</html>
