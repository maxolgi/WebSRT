<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>WebSRT</title>
    <style>
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #111;
        color: #ddd;
        margin: 0;
        padding: 1.5rem;
        transition: padding 0.2s ease;
      }
      body.debug-open {
      }
      body.resizing { transition: none; }
      h1 { font-size: 1.1rem; }
      video, canvas { background: #000; display: block; }
      #video-canvas {
        max-width: 100%;
        max-height: calc(100vh - 100px);
        width: auto;
        height: auto;
      }
      #video-canvas:fullscreen {
        width: 100vw; height: 100vh; object-fit: contain; background: #000;
      }
      .ok { color: #6f6; }
      .err { color: #f66; }
      .info { color: #6cf; }
      input, button, select {
        font: inherit; padding: 4px; background: #222; color: #ddd;
        border: 1px solid #444; border-radius: 3px;
      }
      button:hover { background: #333; }
      button:disabled { opacity: 0.5; }
      .controls { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      a { color: #6cf; }
      a.back { display: inline-block; margin-bottom: 8px; text-decoration: none; }

      /* Dark-themed thin scrollbars */
      * {
        scrollbar-width: thin;
        scrollbar-color: #444 transparent;
      }
      *::-webkit-scrollbar { width: 8px; height: 8px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
      *::-webkit-scrollbar-thumb:hover { background: #555; }
      *::-webkit-scrollbar-corner { background: transparent; }

      /* Debug panel overlay */
      #debug-root {
        position: fixed; top: 0; right: 0; width: 34vw; height: 100vh;
        background: rgba(17, 17, 17, 0.97); border-left: 1px solid #333;
        z-index: 9999; display: none; flex-direction: column;
        font-size: 12px; box-shadow: -4px 0 16px rgba(0,0,0,0.5);
      }
      #debug-root.visible { display: flex; }
      .debug-resizer {
        position: fixed; top: 0; right: 34vw; width: 7px; height: 100vh;
        cursor: col-resize; z-index: 10001; background: transparent;
        transition: background 0.15s; display: none;
        transform: translateX(50%);
      }
      .debug-resizer.visible { display: block; }
      .debug-resizer:hover, .debug-resizer.dragging { background: transparent; }

      .debug-tabs {
        display: flex; border-bottom: 1px solid #333; flex-shrink: 0;
        overflow-x: auto;
      }
      .debug-tab {
        padding: 6px 12px; cursor: pointer; border: none; background: none;
        color: #888; border-bottom: 2px solid transparent; white-space: nowrap;
        font: inherit; font-size: 12px;
      }
      .debug-tab.active { color: #6cf; border-bottom-color: #6cf; }
      .debug-content {
        flex: 1; overflow-y: auto; padding: 8px;
      }
      .debug-section { margin-bottom: 12px; }
      .debug-section h3 {
        font-size: 11px; color: #999; margin: 0 0 4px 0;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .debug-table { width: 100%; border-collapse: collapse; }
      .debug-table td { padding: 2px 6px; border-bottom: 1px solid #222; }
      .debug-table td:first-child { color: #999; width: 40%; }
      .debug-table td:last-child { color: #ddd; text-align: right; font-family: inherit; }
      .stat-good { color: #6f6; }
      .stat-warn { color: #fc6; }
      .stat-bad { color: #f66; }

      .chart-container { position: relative; height: 120px; margin: 4px 0; }

      /* Packet timeline + inspector (Demux tab) */
      .pkt-live { font-size: 11px; color: #6cf; margin-bottom: 6px; }
      .pkt-live .pkt-dot { color: #6f6; font-weight: bold; }
      .pkt-filterbar { display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
      .pkt-filterbar input, .pkt-filterbar select { padding: 2px 4px; font-size: 11px; min-width: 0; }
      .pkt-filterbar input[type="text"] { flex: 1 1 110px; }
      .pkt-filterbar input[type="number"] { width: 64px; }
      .packet-scroll { display: block; max-height: 300px; overflow: auto; border: 1px solid #333; }
      .packet-list { display: block; width: 100%; border-collapse: collapse; font-size: 11px; }
      .packet-list thead { display: block; position: sticky; top: 0; z-index: 1; background: #1a1a1a; }
      .packet-list thead tr { background: #1a1a1a; }
      .packet-list thead th {
        color: #999; text-align: left; font-weight: normal;
        padding: 0 4px; border-bottom: 1px solid #444;
      }
      .packet-list tbody { display: block; }
      .packet-list tr {
        display: flex; height: 24px; line-height: 24px;
        position: relative; align-items: center;
      }
      .packet-list th, .packet-list td {
        display: inline-block; overflow: hidden; white-space: nowrap;
        text-overflow: ellipsis; padding: 0 4px; box-sizing: border-box;
        border-bottom: 1px solid #222;
      }
      .packet-list td.pkt-c-nal, .packet-list th.pkt-c-nal { flex: 1 1 auto; }
      .packet-list tbody tr:hover { filter: brightness(1.25); }
      .pkt-row-psi   { background: #2d1b4e; }
      .pkt-row-video { background: #1b2d4e; }
      .pkt-row-audio { background: #1b4e2d; }
      .pkt-row-ra    { background: #1a1a1a; box-shadow: inset 3px 0 0 #6f6; }
      .pkt-row-error { background: #4e1b1b; }
      .pkt-row-other { background: #2a2a2a; }
      .pkt-row-selected { outline: 1px solid #6cf; outline-offset: -1px; }
      .pkt-c-num  { color: #666; text-align: right; }
      .pkt-c-kind { text-align: center; font-weight: bold; }
      .pkt-actions {
        position: absolute; right: 2px; top: 50%; transform: translateY(-50%);
        opacity: 0; display: flex; gap: 2px; background: rgba(0,0,0,0.7);
        padding: 1px 2px; border-radius: 2px; transition: opacity 0.1s;
      }
      .packet-list tbody tr:hover .pkt-actions { opacity: 1; }
      .pkt-mini {
        padding: 0 4px; font-size: 10px; line-height: 16px; height: 16px;
        border: 1px solid #444; background: #222; color: #ddd;
        cursor: pointer; border-radius: 2px;
      }
      .pkt-mini:hover { background: #333; }
      .pkt-badge {
        display: inline-block; padding: 0 3px; font-size: 9px;
        line-height: 14px; border-radius: 2px; margin-left: 2px;
      }
      .pkt-badge-bad  { background: #4e1b1b; color: #f88; }
      .pkt-badge-good { background: #1b4e2d; color: #8f8; }
      .pkt-inspector { border: 1px solid #333; padding: 6px; font-size: 11px; max-height: 340px; overflow: auto; }
      .pkt-inspector h4 {
        margin: 6px 0 2px; color: #999; font-size: 10px;
        text-transform: uppercase; letter-spacing: 0.5px;
      }
      .pkt-inspector h4:first-child { margin-top: 0; }
      .pkt-inspector table { width: 100%; border-collapse: collapse; }
      .pkt-inspector td { padding: 1px 4px; border-bottom: 1px solid #222; }
      .pkt-inspector td:first-child { color: #999; width: 45%; }
      .pkt-inspector td:last-child { color: #ddd; text-align: right; }
      .pkt-warn { color: #fc6; }
      .pkt-muted { color: #666; font-style: italic; }
    </style>
  </head>
  <body>
    <div>
      <canvas id="video-canvas" width="640" height="360"></canvas>
      <div class="controls">
        <button id="connect">connect</button>
        <label>latency: <input type="number" id="latency-num" min="20" max="8000" step="10" value="300" />ms</label>
        <button id="mute" disabled>muted</button>
        <button id="fullscreen">fullscreen</button>
      </div>
    </div>
    <div id="debug-root"></div>
    <script src="/cert-hash.js"></script>
    <script type="module" src="/src/advanced.tsx"></script>
  </body>
</html>
